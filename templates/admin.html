<div class="admin-container">
    <h2>All Appointments <a href="/logout" style="float:right; font-size:14px;">Logout</a></h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Patient Name</th>
                <th>Phone</th>
                <th>Date</th>
                <th>Message</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for appt in data %}
            <tr>
                <td>{{ appt[0] }}</td>
                <td>{{ appt[1] }}</td>
                <td>{{ appt[2] }}</td>
                <td>{{ appt[3] }}</td>
                <td>{{ appt[4] }}</td>
                <td>
                    <a href="/delete/{{ appt[0] }}" onclick="return confirm('Mita dein?')" style="color:red;">❌ Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
